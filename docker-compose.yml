version: '3.9'

services:
  nginx:
    build: ./nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - frontend
      - backend
      - whiteboard
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    expose:
      - "3000"
    depends_on:
      backend:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'

  backend:
    build: ./backend
    expose:
      - "8000"
    environment:
      - DATABASE_URL=postgresql://chemrep:password@postgres:5432/chemrep
      - S3_ENDPOINT=http://minio:9000
      - S3_BUCKET=chemrep-files
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'

  bot:
    build:
      context: .
      dockerfile: bot/Dockerfile
    environment:
      - DATABASE_URL=postgresql://chemrep:password@postgres:5432/chemrep
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - BOARD_WS_URL=ws://whiteboard:3001
    depends_on:
      backend:
        condition: service_started
      postgres:
        condition: service_healthy
      whiteboard:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 1536M
          cpus: '1.0'

  whiteboard:
    build: ./whiteboard
    expose:
      - "3001"
    environment:
      - PORT=3001
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: chemrep
      POSTGRES_USER: chemrep
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chemrep -d chemrep"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

volumes:
  postgres_data:
  minio_data:
