name: Database & Files Backup

on:
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run database backup
        run: |
          chmod +x scripts/backup-db.sh
          ./scripts/backup-db.sh
      - name: Backup MinIO files
        run: |
          mkdir -p backups/minio
          # Export MinIO data using mc (MinIO Client)
          # This requires MINIO_ROOT_USER and MINIO_ROOT_PASSWORD env vars
          if command -v mc &> /dev/null; then
            mc alias set backup http://localhost:9000 ${{ secrets.MINIO_ROOT_USER }} ${{ secrets.MINIO_ROOT_PASSWORD }}
            mc mirror backup/chemrep-files backups/minio/ || echo "MinIO backup skipped (not accessible)"
          else
            echo "mc not installed, skipping MinIO backup"
          fi
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: full-backup
          path: |
            backups/*.sql.gz
            backups/minio/
          retention-days: 7
