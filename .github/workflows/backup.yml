name: Database Backup

on:
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run backup
        run: |
          chmod +x scripts/backup-db.sh
          ./scripts/backup-db.sh
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: database-backup
          path: backups/*.sql.gz
          retention-days: 7
